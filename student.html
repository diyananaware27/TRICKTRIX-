<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Quiz • TrickTrix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-body">
  <header class="topbar">
    <div class="brand">✨ TrickTrix</div>
    <div id="userInfo" class="user-info"></div>
  </header>

  <main class="center-card quiz-card">
    <h2 id="quizTitle">Student Quiz</h2>
    <div id="meta" class="small muted"></div>

    <div id="questionBox" class="qbox">
      <p id="qNumber" class="muted small"></p>
      <div id="qText" class="qtext">Question text</div>
      <img id="qImg" class="q-image hidden" alt="" />
      <div id="options" class="options"></div>
    </div>

    <div class="quiz-footer">
      <div class="left">
        <div class="timer small">Time Left: <span id="timer">30</span>s</div>
        <div class="progress small">Progress: <span id="progressText">0/0</span></div>
      </div>
      <div class="controls">
        <button class="btn outline" id="prevBtn">Prev</button>
        <button class="btn outline" id="nextBtn">Next</button>
        <button class="btn primary" id="submitBtn">Submit</button>
      </div>
    </div>
  </main>

  <div id="popup" class="popup hidden"></div>

<script src="script.js"></script>
<script>
  // Initialize student quiz
  document.getElementById('prevBtn').addEventListener('click', prevQuestion);
  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
  document.getElementById('submitBtn').addEventListener('click', finishQuiz);
  loadQuizPage('student');
</script>
</body>
</html>
